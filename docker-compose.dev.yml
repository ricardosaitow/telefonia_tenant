services:
  postgres:
    image: postgres:16-alpine
    container_name: portal_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: portal_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
    ports:
      - "127.0.0.1:5444:5432"
    volumes:
      - portal_pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portal_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "log_statement=ddl"

volumes:
  portal_pg_data:
    name: portal_pg_data
